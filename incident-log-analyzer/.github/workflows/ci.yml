name: CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'incident-log-analyzer/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'incident-log-analyzer/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: incident-log-analyzer

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install black flake8 pytest pytest-cov

    - name: Lint
      run: |
        flake8 src tests || echo "Flake8 warnings"
        black --check src tests || echo "Black style warnings"

    - name: Run tests
      run: |
        PYTHONPATH=. pytest tests/ -v --cov=src
